name: Build APK Ampersand POS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar iconos PNG validos
        run: |
          pip install Pillow -q
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144}
          for density, size in sizes.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              img = Image.new('RGBA', (size, size), (76, 175, 80, 255))
              draw = ImageDraw.Draw(img)
              m = size // 5
              draw.ellipse([m, m, size-m, size-m], fill=(255, 255, 255, 220))
              img.save(f'{path}/ic_launcher.png', 'PNG')
              print(f'OK {density} {size}x{size}')
          PYEOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: gradle assembleRelease --no-daemon -p .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ampersand-pos-v${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
