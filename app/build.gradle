plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.ampersand.pos'

    defaultConfig {
        applicationId "com.ampersand.pos"
        minSdk 21          // Android 5.0 — cubre Vizzion (Android 6) y todo lo moderno
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug  // Para pruebas — en producción usar keystore propio
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Sin dependencias externas — todo es Android SDK nativo
}
